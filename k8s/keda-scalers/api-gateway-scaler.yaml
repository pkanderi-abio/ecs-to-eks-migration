# KEDA ScaledObject — api-gateway
# Scales on: requests/sec (Prometheus) + SQS queue depth
# Min: 3, Max: 50 replicas
# Replaces ECS Service Auto Scaling (Target Tracking)
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: api-gateway-scaler
  namespace: platform
spec:
  scaleTargetRef:
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    name: api-gateway
  pollingInterval:  15
  cooldownPeriod:   60
  idleReplicaCount: 2
  minReplicaCount:  3
  maxReplicaCount:  50
  fallback:
    failureThreshold: 3
    replicas: 6  # fallback to last-known good replica count
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-operated.monitoring.svc.cluster.local:9090
        metricName: http_requests_per_second
        threshold: "500"  # 500 req/s per replica before scale-out
        query: |
          sum(rate(http_requests_total{service="api-gateway"}[1m]))
    - type: aws-sqs-queue
      authenticationRef:
        name: keda-aws-credentials
      metadata:
        queueURL: https://sqs.us-east-1.amazonaws.com/123456789/api-gateway-jobs
        queueLength: "100"
        awsRegion: us-east-1
        identityOwner: operator
  advanced:
    restoreToOriginalReplicaCount: false
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - type: Pods
              value: 5
              periodSeconds: 60
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Pods
              value: 10
              periodSeconds: 60
            - type: Percent
              value: 50
              periodSeconds: 60
          selectPolicy: Max
