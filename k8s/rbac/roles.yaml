# RBAC for platform namespace
# Roles: platform-admin, platform-deployer (CI/CD), platform-readonly
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: platform-deployer
  namespace: platform
rules:
  - apiGroups: ["apps", "argoproj.io", "keda.sh"]
    resources: ["deployments", "rollouts", "scaledobjects"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-actions-deployer
  namespace: platform
subjects:
  - kind: ServiceAccount
    name: github-actions
    namespace: kube-system
roleRef:
  kind: Role
  name: platform-deployer
  apiGroup: rbac.authorization.k8s.io
