# Argo Rollout — api-gateway
# Canary: 5% → analysis → 25% → 30min pause → 50% → analysis → 1h pause → 100%
# Auto-rollback on: error_rate > 1% OR p99_latency > 500ms
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: api-gateway
  namespace: platform
  annotations:
    rollout.argoproj.io/revision: "1"
spec:
  replicas: 6
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        version: "{{ .Values.image.tag }}"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: api-gateway
      terminationGracePeriodSeconds: 60
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: api-gateway
      containers:
        - name: api-gateway
          image: "123456789.dkr.ecr.us-east-1.amazonaws.com/api-gateway:latest"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 9090
          envFrom:
            - secretRef:
                name: api-gateway-secrets
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu:    "200m"
              memory: "512Mi"
            limits:
              cpu:    "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      securityContext:
        seccompProfile:
          type: RuntimeDefault
  strategy:
    canary:
      canaryService: api-gateway-canary
      stableService: api-gateway-stable
      trafficRouting:
        alb:
          ingress: api-gateway-ingress
          servicePort: 80
          annotationPrefix: alb.ingress.kubernetes.io
      steps:
        - setWeight: 5
        - analysis:
            templates:
              - templateName: error-rate-check
            args:
              - name: service-name
                value: api-gateway
        - pause:
            duration: 15m
        - setWeight: 25
        - pause:
            duration: 30m
        - setWeight: 50
        - analysis:
            templates:
              - templateName: error-rate-check
              - templateName: p99-latency-check
            args:
              - name: service-name
                value: api-gateway
        - pause:
            duration: 1h
        - setWeight: 100
      antiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution: {}
      maxSurge: "25%"
      maxUnavailable: 0
