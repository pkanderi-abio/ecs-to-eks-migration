# ClusterSecretStore — uses IRSA to authenticate against AWS Secrets Manager
# Replaces 612 SSM Parameter Store parameters (migrated via scripts/migrate-ssm-to-secrets.sh)
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
