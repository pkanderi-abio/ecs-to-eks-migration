# ExternalSecret for api-gateway — pulls from AWS Secrets Manager
# Secret "prod/api-gateway/config" was created by scripts/migrate-ssm-to-secrets.sh
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: api-gateway-secrets
  namespace: platform
spec:
  refreshInterval: "5m"
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: api-gateway-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
  dataFrom:
    - extract:
        key: prod/api-gateway/config
