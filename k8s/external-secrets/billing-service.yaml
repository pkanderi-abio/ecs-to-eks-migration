apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: billing-service-secrets
  namespace: platform
spec:
  refreshInterval: "5m"
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: billing-service-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: prod/billing-service/config
